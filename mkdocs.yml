site_name: OAuth 2.0 Guide
site_description: A comprehensive guide to OAuth 2.0 authentication and authorization flows
site_author: Arvind Waiker

# Repository link
repo_url: https://github.com/arvindwaiker/OAuth
repo_name: OAuth

theme:
  name: material
  palette:
    primary: blue
    accent: blue
  features:
    - navigation.instant
    - search.suggest
    - search.highlight

# Navigation
nav:
  - Home: index.md
  - Authorization Code Flow: Authorization-Code-Flow.md
  - Client Credentials Flow: Client-Credentials-Flow.md
  - Device Code Flow: Device-Code-Flow.md
  - Refresh Token Flow: Refresh-Token-Flow.md

# Markdown extensions
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

# Plugins
plugins:
  - search:
      lang: en
  - mermaid2:
      version: "9.1.7"

# Extra JavaScript for Mermaid
extra:
  mermaid:
    version: "9.1.7"
  javascript:
    - javascripts/mermaid-render.js

# Copyright
copyright: Copyright &copy; 2024 Arvind Waiker